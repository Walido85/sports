name: Kawarji Scraper (Sports + Finance + Weather)

on:
  schedule:
    - cron: '0 */3 * * *'     # Every 3 hours
  workflow_dispatch:          # Manual run

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Sports Scraper
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python scrape_kawarji.py

      - name: Run Finance Scraper
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python finance_scraper.py

      - name: Run Weather Scraper
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python weather_scraper.py
        
        - name: Run Pharmacies Scraper
        env:
    FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
  run: python pharmacies_scraper.py
