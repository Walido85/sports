name: walid Sports

on:
  schedule:
    - cron: '0 * * * *'  # Runs every 1 hour
    
  workflow_dispatch:          # Allows manual run from GitHub

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements + Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps
    
      - name: Run Finance Scraper if:false
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python finance_scraper.py
        
      - name: Run Weather Scraper
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python weather_scraper.py

      - name: Run Pharmacies Scraper 
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python pharmacies_scraper.py

      - name: Run football Scraper
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python football.py

      - name: Upload debug files (screenshot + HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: football-debug-files
          path: |
            debug/*.png
            debug/*.html
          retention-days: 7

      - name: Show Summary
        run: echo "🎉 All scrapers completed successfully!"
